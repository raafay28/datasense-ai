services:
  - type: web
    name: datasense-ai-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    plan: free
    envVars:
      - key: MYSQL_HOST
        value: your_mysql_host
      - key: MYSQL_USER
        value: your_mysql_user
      - key: MYSQL_PASSWORD
        value: your_mysql_password
      - key: MYSQL_DB
        value: datasense
      - key: GEMINI_API_KEY
        value: your_gemini_api_key
      - key: SECRET_KEY
        value: datasense-super-secret-2024